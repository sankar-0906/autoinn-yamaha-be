  version: "3.8"

  services:
    db:
      image: postgres:16   # 👈 safer version
      environment:
        POSTGRES_USER: autoinn
        POSTGRES_PASSWORD: autoinn_pass
        POSTGRES_DB: autoinn_dev
      ports:
        - "5433:5432"
      volumes:
        - pgdata:/var/lib/postgresql/data   # 👈 FIXED PATH

    adminer:
      image: adminer
      ports:
        - "8081:8080"

  volumes:
    pgdata: