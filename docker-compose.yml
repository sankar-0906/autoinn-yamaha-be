version: "3.8"

services:
  db:
    image: postgres:18
    environment:
      POSTGRES_USER: autoinn
      POSTGRES_PASSWORD: autoinn_pass
      POSTGRES_DB: autoinn_dev
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql
  adminer:
    image: adminer
    ports:
      - "8081:8080"

volumes:
  pgdata:
